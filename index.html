<!DOCTYPE html>
<html>

<head>
  <title></title>
  <meta charset="utf-8">
  <meta name="viewport"
    content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <style>
    @-ms-viewport {
      width: device-width;
    }
  </style>
  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" type="image/x-icon" sizes="16x16 32x32 48x48 64x64" href="/img/pano.svg">
</head>

<body class="multiple-scenes ">

  <div id="pano"></div>

  <div id="sceneList">
    <ul class="scenes">
    </ul>
  </div>

  <div id="titleBar">
    <h1 class="sceneName"></h1>
  </div>

  <a href="javascript:void(0)" id="autorotateToggle" style="display: none;">
    <img class="icon off" src="img/play.png">
    <img class="icon on" src="img/pause.png">
  </a>

  <a href="javascript:void(0)" id="fullscreenToggle">
    <img class="icon off" src="img/fullscreen.svg">
    <img class="icon on" src="img/windowed.svg">
  </a>

  <a href="javascript:void(0)" id="sceneListToggle">
    <img class="icon off" src="img/menu.svg">
    <img class="icon on" src="img/close.svg">
  </a>

  <a href="javascript:void(0)" id="viewUp" class="viewControlButton viewControlButton-1">
    <img class="icon" src="img/up.png">
  </a>
  <a href="javascript:void(0)" id="viewDown" class="viewControlButton viewControlButton-2">
    <img class="icon" src="img/down.png">
  </a>
  <a href="javascript:void(0)" id="viewLeft" class="viewControlButton viewControlButton-3">
    <img class="icon" src="img/left.png">
  </a>
  <a href="javascript:void(0)" id="viewRight" class="viewControlButton viewControlButton-4">
    <img class="icon" src="img/right.png">
  </a>
  <a href="javascript:void(0)" id="viewIn" class="viewControlButton viewControlButton-5">
    <img class="icon" src="img/plus.png">
  </a>
  <a href="javascript:void(0)" id="viewOut" class="viewControlButton viewControlButton-6">
    <img class="icon" src="img/minus.png">
  </a>

  <script src="vendor/screenfull.min.js"></script>
  <script src="vendor/bowser.min.js"></script>
  <script src="vendor/marzipano.js"></script>

  <script src="data.js"></script>

  <script>
    document.title = APP_DATA.name;

    // ============================================================
    // Группировка сцен
    // ============================================================
    var SCENE_GROUPS = [
      {
        title: '🌍 Территория',
        match: function(name) {
          return /^(Главный вид|Дрон|Въездные ворота)/i.test(name);
        },
        short: function(name) { return name; }
      },
      {
        title: '🏡 Нижний участок',
        match: function(name) {
          return /^Нижний участок/i.test(name);
        },
        short: function(name) { return name.replace(/^Нижний участок\s*/i, '') || name; }
      },
      {
        title: '🏡 Верхний участок',
        match: function(name) {
          return /^Верхний участок/i.test(name);
        },
        short: function(name) { return name.replace(/^Верхний участок\s*/i, '') || name; }
      },
      {
        title: '🪜 Лестница',
        match: function(name) {
          return /^Лестница/i.test(name);
        },
        short: function(name) { return name; }
      },
      {
        title: '1️⃣ 1 этаж',
        match: function(name) {
          return /^1 этаж/i.test(name);
        },
        short: function(name) { return name.replace(/^1 этаж\s*—?\s*/i, '') || name; }
      },
      {
        title: '2️⃣ 2 этаж',
        match: function(name) {
          return /^2 этаж/i.test(name);
        },
        short: function(name) { return name.replace(/^2 этаж\s*—?\s*/i, '') || name; }
      },
      {
        title: '3️⃣ 3 этаж',
        match: function(name) {
          return /^3 этаж/i.test(name);
        },
        short: function(name) { return name.replace(/^3 этаж\s*—?\s*/i, '') || name; }
      },
      {
        title: '🏋️ Хозблок',
        match: function(name) {
          return /^Хозблок/i.test(name);
        },
        short: function(name) { return name.replace(/^Хозблок\s*—?\s*/i, '') || name; }
      }
    ];

    // Распределяем сцены по группам
    var grouped = {};
    var groupOrder = [];

    APP_DATA.scenes.forEach(function(scene) {
      var groupTitle = '📍 Прочее';
      var shortName = scene.name;

      for (var g = 0; g < SCENE_GROUPS.length; g++) {
        if (SCENE_GROUPS[g].match(scene.name)) {
          groupTitle = SCENE_GROUPS[g].title;
          shortName = SCENE_GROUPS[g].short(scene.name);
          break;
        }
      }

      if (!grouped[groupTitle]) {
        grouped[groupTitle] = [];
        groupOrder.push(groupTitle);
      }
      grouped[groupTitle].push({ id: scene.id, name: scene.name, shortName: shortName });
    });

    // Генерируем HTML
    var ul = document.querySelector('#sceneList ul');

    groupOrder.forEach(function(groupTitle) {
      var scenes = grouped[groupTitle];

      // Заголовок группы
      var header = document.createElement('li');
      header.classList.add('scene-group-header');
      header.innerHTML = '<span class="group-arrow">▾</span> ' + groupTitle;
      header.addEventListener('click', function() {
        header.classList.toggle('collapsed');
        // Сворачиваем/разворачиваем все сцены этой группы
        var next = header.nextElementSibling;
        while (next && !next.classList.contains('scene-group-header')) {
          if (header.classList.contains('collapsed')) {
            next.style.display = 'none';
          } else {
            next.style.display = '';
          }
          next = next.nextElementSibling;
        }
      });
      ul.appendChild(header);

      // Сцены группы
      scenes.forEach(function(scene) {
        var a = document.createElement('a');
        var li = document.createElement('li');

        a.classList.add('scene');
        a.setAttribute('data-id', scene.id);
        a.setAttribute('href', 'javascript:void(0)');

        li.classList.add('text');
        li.innerHTML = scene.shortName;

        a.appendChild(li);
        ul.appendChild(a);
      });
    });
  </script>

  <script src="index.js"></script>
</body>

</html>
